name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    # macos-15 ships Xcode 16.x / Swift 6, which this package requires.
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Build Project
        run: swift build

      # Assert-based unit tests: GGUF parsing, settings, HF command parsing,
      # Hermes config rewriting, fits-check. The end-to-end smoke test is not
      # run here — it needs a llama.cpp install and a real GGUF.
      - name: Run Unit Tests
        run: swift run llamaboard-tests
